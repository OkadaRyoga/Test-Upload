<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AnimaLotta Statistics</title>

<style>
body { font-family: sans-serif; }
button {
  width: 70px;
  height: 40px;
  margin: 3px;
  font-size: 16px;
  border-radius: 8px;
  white-space: nowrap;
}
.selected {
  background: orange;
}
#numbers {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 5px;
}

#numbers button {
  width: 80%;
  height: 60px;
  font-size: 16px;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  border-radius: 8px;
}

/* クリアボタン崩れ防止 */
button {
  white-space: nowrap;
}

</style>

<link rel="manifest">
</head>

<body>

<h3>数字入力</h3>
<div id="numbers"></div>
<br>
<button id="submitBtn" onclick="send()" disabled>記録</button>
<button onclick="resetSelection()">クリア</button>

<hr>

<h3>出現率</h3>
<select id="mode">
  <option value="3">3個目まで</option>
  <option value="5">5個目まで</option>
  <option value="8">8個目まで</option>
</select>
<button onclick="loadStats()">表示</button>

<pre id="stats"></pre>

<hr>


<h3>共起検索（3〜5個）</h3>

<label>一致条件：</label>
<select id="matchLevel">
  <option value="full">完全一致</option>
  <option value="n-1">-1まで許可</option>
  <option value="n-2">-2まで許可</option>
</select>

<button onclick="searchCo()">検索</button>

<pre id="co_result"></pre>


<script>
let selected = [];

for (let i=1;i<=25;i++){
  let btn = document.createElement("button");
  btn.innerText = i;

  btn.onclick = ()=>{

    let index = selected.indexOf(i);

    if(index !== -1){
      // 解除
      selected.splice(index,1);
    } else {
      if(selected.length >= 8){
        alert("最大8個まで");
        return;
      }
      selected.push(i);
    }

    updateButtons();
  };

  document.getElementById("numbers").appendChild(btn);
}

// 記録
function send(){
  if(selected.length !== 8){
    return;
  }

  fetch("/add",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({numbers:selected})
  });

  selected = [];
  location.reload();
}

// 確率
function loadStats(){
  let mode = document.getElementById("mode").value;

  fetch("/stats")
  .then(res => res.json())
  .then(data => {

    let arr = Object.entries(data[mode]);

    // 出現率でソート
    arr.sort((a,b)=>b[1]-a[1]);

    let text = `=== ${mode}個目まで ===\n`;

    for(let [k,v] of arr){
      text += `${k}: ${v.toFixed(2)}%\n`;
    }

    document.getElementById("stats").innerText = text;
  });
}

// 共起
function searchCo(){
  if(selected.length < 3 || selected.length > 5){
    alert("3〜5個選択");
    return;
  }

  let matchLevel = document.getElementById("matchLevel").value;

  fetch("/co_search",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      numbers: selected,
      match: matchLevel
    })
  })
  .then(r=>r.json())
  .then(data=>{
    let arr = Object.entries(data);
  
    // 出やすい順
    arr.sort((a,b)=>b[1]-a[1]);
  
    let text = "出やすい数字（重み付き）\n\n";
  
    for(let [k,v] of arr){
      text += `${k}: ${v.toFixed(1)}%\n`;
    }
  
    document.getElementById("co_result").innerText = text;
  });
}

function updateButtons(){
  let buttons = document.getElementById("numbers").children;

  for(let i=0;i<buttons.length;i++){
    let num = i+1;
    let btn = buttons[i];

    let index = selected.indexOf(num);

    if(index !== -1){
      btn.classList.add("selected");

      // 順番表示
      btn.innerText = `${num}\n(${index+1})`;

    // 青系グラデーション
    let lightness = 85 - (index * 6); // 85% → 37%くらい
    btn.style.backgroundColor = `hsl(200, 80%, ${lightness}%)`;

    } else {
      btn.classList.remove("selected");
      btn.innerText = num;
      btn.style.backgroundColor = ""; // リセット
    }
  }
  // 記録ボタン制御
    let submitBtn = document.getElementById("submitBtn");

    if(selected.length === 8){
    submitBtn.disabled = false;
    submitBtn.style.backgroundColor = "#4CAF50"; // 緑
    submitBtn.style.color = "white";
    } else {
    submitBtn.disabled = true;
    submitBtn.style.backgroundColor = "#ccc"; // グレー
    submitBtn.style.color = "#666";
    }
}

function resetSelection(){
  selected = [];
  updateButtons();
}


// PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/static/sw.js');
}
</script>

</body>
</html>
